<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200">
  <rect width="1200" height="1200" fill="#1A1814"/>
  <!--
    Monolito: bloque sólido naranja con G/O/N TROQUELADAS como vacíos.
    Las letras se leen como ausencia (negativo), revelando el Ink del fondo.
    Aspecto brutal arquitectónico, muy bold.
  -->
  <g fill="#6B1F05">
    <!-- Bloque sólido con voids (rule evenodd permite crear los huecos en una sola path) -->
    <path fill-rule="evenodd" d="
      M 100 200 L 1100 200 L 1100 1000 L 100 1000 Z

      M 200 360 L 480 360 L 480 460 L 320 460 L 320 540 L 480 540 L 480 720 L 200 720 Z

      M 540 360 L 820 360 L 820 720 L 540 720 Z
      M 620 460 L 740 460 L 740 620 L 620 620 Z

      M 880 360 L 970 360 L 970 720 L 880 720 Z
      M 1000 360 L 1090 360 L 1090 720 L 1000 720 Z
      M 880 360 L 970 360 L 1090 720 L 1000 720 Z
    "/>

    <!-- Acento: línea fina inferior al estilo "subrayado de catálogo" -->
    <rect x="200" y="800" width="800" height="6" opacity="0.6"/>
  </g>
</svg>
