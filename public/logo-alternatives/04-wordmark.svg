<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 600">
  <rect width="2000" height="600" fill="#1A1814"/>
  <g fill="#6B1F05">
    <!--
      Wordmark "GON" horizontal. Display Extended Black geométrico.
      Cada letra ~480px ancho, ~400px alto, trazo 90px, gap 40px.
      Espaciado tight. Underline opcional al final como acento.
    -->

    <!-- G (x: 100..580) -->
    <path fill-rule="evenodd" d="
      M 100 100 L 580 100 L 580 500 L 100 500 Z
      M 220 220 L 460 220 L 460 380 L 220 380 Z
    "/>
    <rect x="380" y="290" width="200" height="90"/>

    <!-- O (x: 660..1140) -->
    <path fill-rule="evenodd" d="
      M 660 100 L 1140 100 L 1140 500 L 660 500 Z
      M 780 220 L 1020 220 L 1020 380 L 780 380 Z
    "/>

    <!-- N (x: 1220..1700) -->
    <rect x="1220" y="100" width="130" height="400"/>
    <rect x="1570" y="100" width="130" height="400"/>
    <polygon points="1220,100 1350,100 1700,500 1570,500"/>

    <!-- Acento minimalista al final: cuadrado pequeño debajo de la N como punto identificador -->
    <rect x="1760" y="450" width="50" height="50"/>
  </g>
</svg>
