<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <rect width="1000" height="1000" fill="#1A1814"/>
  <g fill="#6B1F05">
    <!-- Outer ring (annulus) -->
    <path fill-rule="evenodd" d="M 500 60 A 440 440 0 1 1 499.99 60 Z M 500 165 A 335 335 0 1 0 499.99 165 Z"/>
    <!-- Y-divider Mercedes style -->
    <rect x="465" y="165" width="70" height="335"/>
    <rect x="465" y="165" width="70" height="335" transform="rotate(-120 500 500)"/>
    <rect x="465" y="165" width="70" height="335" transform="rotate(120 500 500)"/>
    <!-- G interior detail (top-left wedge) -->
    <rect x="280" y="260" width="50" height="160"/>
    <rect x="280" y="380" width="120" height="50"/>
    <!-- O interior detail (top-right wedge): inner curved cutout outline -->
    <path d="M 700 320 A 200 200 0 0 0 580 220 L 580 280 A 140 140 0 0 1 670 360 Z"/>
    <!-- N interior detail (bottom wedge): diagonal -->
    <polygon points="370,580 420,580 600,840 550,840"/>
  </g>
</svg>
