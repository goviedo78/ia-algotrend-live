<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500">
  <rect width="1000" height="1500" fill="#1A1814"/>
  <g fill="#6B1F05">
    <!--
      Stacked monogram: G / O / N apilados verticalmente como bloques pesados.
      Cada letra ocupa ~440px de alto, separación 40px. Trazo grueso 80px.
    -->
    <!-- G (top) — C invertida con lengua interior -->
    <!-- Outer C shape -->
    <path d="M 200 100 L 800 100 L 800 220 L 320 220 L 320 320 L 800 320 L 800 540 L 200 540 Z"/>
    <!-- Inner cut to make C's mouth -->
    <rect x="320" y="320" width="480" height="100"/>
    <!-- Tongue stub -->
    <rect x="600" y="320" width="200" height="220"/>
    <!-- Adjust: redraw G as proper shape using subpaths -->

    <!-- Simplified G: rect outer, rect inner cutout, tongue rect -->
    <path fill-rule="evenodd" d="
      M 200 100 L 800 100 L 800 540 L 200 540 Z
      M 320 220 L 680 220 L 680 420 L 320 420 Z
    "/>
    <!-- G tongue: small horizontal stub jutting in from right at middle -->
    <rect x="500" y="320" width="180" height="80"/>

    <!-- O (middle) — donut -->
    <path fill-rule="evenodd" d="
      M 200 620 L 800 620 L 800 1060 L 200 1060 Z
      M 320 740 L 680 740 L 680 940 L 320 940 Z
    "/>

    <!-- N (bottom) — left bar + right bar + diagonal -->
    <rect x="200" y="1140" width="160" height="260"/>
    <rect x="640" y="1140" width="160" height="260"/>
    <polygon points="200,1140 360,1140 800,1400 640,1400"/>
  </g>
</svg>
