<!--
  GON · Micro variant
  Reconstrucción geométrica simplificada para uso a 16-32px (favicon).
  La N va reforzada (trazos más gruesos) porque a tamaños chicos las letras
  finas desaparecen. La silueta y la división tripartita se mantienen.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="GON" shape-rendering="geometricPrecision">
  <g fill="var(--logo-fg, currentColor)">
    <!-- Outer ring (annulus via even-odd) -->
    <path fill-rule="evenodd" d="M 16 1 A 15 15 0 1 1 15.99 1 Z M 16 7 A 9 9 0 1 0 16 25 A 9 9 0 1 0 16 7 Z"/>

    <!-- Y-divider Mercedes style: up arm + 2 down arms at 120deg -->
    <rect x="14.5" y="7" width="3" height="9"/>
    <rect x="14.5" y="7" width="3" height="9" transform="rotate(120 16 16)"/>
    <rect x="14.5" y="7" width="3" height="9" transform="rotate(-120 16 16)"/>

    <!-- N reinforced diagonal in bottom wedge -->
    <polygon points="13.2,17.5 14.6,17.5 19,24.7 17.6,24.7"/>

    <!-- G hint: small horizontal bar in top-left wedge (the "tongue") -->
    <rect x="9.5" y="13.5" width="3.5" height="1.6"/>

    <!-- O hint: tiny inner curve mark in top-right wedge -->
    <path d="M 19 11.5 A 4 4 0 0 1 22.8 14.5 L 21.5 14.7 A 2.8 2.8 0 0 0 19.2 12.7 Z"/>
  </g>
</svg>
